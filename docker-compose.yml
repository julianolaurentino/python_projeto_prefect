services:

  # ─────────────────────────────────────────
  # Orquestração — Prefect Server (UI + API)
  # ─────────────────────────────────────────
  prefect-server:
    image: prefecthq/prefect:2.19.3-python3.11
    container_name: aic_prefect_server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - aic_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Orquestração — Prefect Worker
  # Executa o pipeline completo: Extract → Load → dbt run → dbt test
  # ─────────────────────────────────────────
  prefect-worker:
    build:
      context: ./orchestration
      dockerfile: Dockerfile
    container_name: aic_prefect_worker
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - DUCKDB_PATH=/app/data/warehouse/aic.duckdb
      - DBT_PROJECT_DIR=/app/transform
    volumes:
      - ./data:/app/data
      - ./orchestration:/app/orchestration
      - ./extraction:/app/extraction
      - ./transform:/app/transform
    networks:
      - aic_network
    depends_on:
      prefect-server:
        condition: service_healthy
    command: >
      sh -c "
        prefect work-pool create aic-pool --type process --overwrite &&
        prefect worker start --pool aic-pool
      "

volumes:
  prefect_data:

networks:
  aic_network:
    driver: bridge